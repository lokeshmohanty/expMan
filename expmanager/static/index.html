<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpMan | Research Dashboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center z-10 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-brand-600 text-white p-1 rounded">
                <i class="ri-flask-line text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-800">ExpMan</h1>
            <span
                class="text-xs px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full border border-gray-200">v0.1.0</span>
        </div>
        <div class="flex items-center gap-4 text-sm text-gray-500">
            <span id="connection-status" class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-green-500"></span> Connected
            </span>
            <button onclick="app.refresh()" class="hover:text-brand-600 transition-colors">
                <i class="ri-refresh-line text-lg"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col shadow-[rgba(0,0,0,0.05)_5px_0_15px]">
            <!-- Experiment Selector -->
            <div class="p-4 border-b border-gray-100">
                <label
                    class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 block">Experiment</label>
                <select id="experiment-select"
                    class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all">
                    <option disabled selected>Loading...</option>
                </select>
            </div>

            <!-- Runs List -->
            <div class="flex-1 overflow-y-auto p-3 space-y-1" id="runs-container">
                <!-- Runs injected here -->
                <div class="text-center text-gray-400 text-sm mt-10">Select an experiment</div>
            </div>

            <div class="p-4 border-t border-gray-200 bg-gray-50 text-xs text-gray-500 text-center">
                Select multiple runs to compare
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-slate-50 p-6">

            <!-- Tab Navigation -->
            <div class="flex gap-4 mb-6 border-b border-gray-200">
                <button class="tab-btn active px-4 py-2 text-sm font-medium text-brand-600 border-b-2 border-brand-600"
                    data-tab="metrics">Metrics & Charts</button>
                <button
                    class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-all"
                    data-tab="config">Configuration</button>
                <button
                    class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-all"
                    data-tab="artifacts">Artifacts</button>
            </div>

            <!-- Tab: Metrics -->
            <div id="tab-metrics" class="tab-content space-y-6">
                <!-- Stat Cards -->
                <div id="stats-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Injected stats -->
                </div>

                <!-- Plotly Charts -->
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-6" id="charts-container">
                    <div
                        class="col-span-1 xl:col-span-2 card p-8 text-center text-gray-400 min-h-[400px] flex items-center justify-center">
                        Select a run to view metrics
                    </div>
                </div>
            </div>

            <!-- Tab: Config -->
            <div id="tab-config" class="tab-content hidden h-full">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-full pb-10">
                    <div class="card p-6 overflow-auto h-full max-h-[80vh] relative w-full">
                        <!-- Content filled by JS -->
                        <div class="text-center text-gray-400 mt-20">Select runs to compare configurations</div>
                    </div>
                </div>
            </div>

            <!-- Tab: Artifacts -->
            <div id="tab-artifacts" class="tab-content hidden h-full flex flex-col">
                <div class="grid grid-cols-12 gap-6 h-[80vh]">
                    <!-- File List -->
                    <div class="col-span-4 card bg-white flex flex-col overflow-hidden">
                        <div class="p-3 border-b bg-gray-50 font-semibold text-xs text-gray-500 uppercase">Files</div>
                        <div id="artifact-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                            <div class="text-center text-gray-400 text-sm mt-10">Select a run to browse artifacts</div>
                        </div>
                    </div>
                    <!-- Preview Area -->
                    <div class="col-span-8 card bg-white flex flex-col overflow-hidden">
                        <div
                            class="p-3 border-b bg-gray-50 font-semibold text-xs text-gray-500 uppercase flex justify-between">
                            <span>Preview</span>
                            <div class="flex items-center gap-3">
                                <span id="preview-filename"
                                    class="text-gray-700 normal-case truncate max-w-[300px]"></span>
                                <a id="preview-download" href="#" target="_blank"
                                    class="hidden text-brand-600 hover:text-brand-800" title="Download">
                                    <i class="ri-download-line text-lg"></i>
                                </a>
                            </div>
                        </div>
                        <div id="artifact-preview"
                            class="flex-1 overflow-auto p-4 flex items-center justify-center bg-slate-50 relative">
                            <div class="text-gray-400">Select a file to preview</div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
